name: neom_ar
description: >
  Cross-platform AR module for Cyberneom. Wraps ARKit (iOS) and ARCore
  (Android) behind a unified interface. Distance measurement, plane
  detection, room scanning, and 3D marker visualization for acoustic
  levitation chamber analysis.
version: 1.0.0
homepage: https://github.com/Open-Neom/neom_ar

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  sint: ^1.3.0
  neom_core: ^2.0.0
  neom_commons: ^2.0.0

  vector_math: ^2.1.4
  hive_flutter: ^1.1.0

  # Platform-specific AR engines
  arkit_plugin: ^1.0.7
  arcore_flutter_plugin: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
